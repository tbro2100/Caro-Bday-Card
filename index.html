<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Til dig ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body>

<div class="container">

    <h1>Til dig</h1>

    <p class="intro">
        Jeg har lavet noget særligt til dig.<br>
        Indtast adgangskoden for at åbne det.
    </p>

    <input
        id="password"
        type="password"
        placeholder="Adgangskode">

    <button id="unlockButton">
        Åbn
    </button>

    <p class="hint">
        Hint: Vores ord for "helt crazy".
    </p>

    <p id="error"></p>

</div>

<script src="script.js"></script>
