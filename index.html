<!DOCTYPE html><html lang='da'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Til dig</title><link rel='stylesheet' href='style.css'></head><body>
<div id='login' class='screen'>
<div class='card'>
<h1>Til dig</h1>
<p>Jeg har lavet noget særligt til dig.<br>Indtast adgangskoden for at åbne det.</p>
<input id='pw' type='password' placeholder='Adgangskode'>
<button onclick='unlock()'>Åbn</button>
<p class='hint'>Hint: Vores ord for "helt crazy".</p>
<p id='err'></p>
</div></div>

<div id='envelope' class='screen hidden'>
<div class='env' onclick='openCard()'>
<div class='letter'></div>
<div class='flap'></div>
</div>
<p>Tryk på kuverten</p>
</div>

<div id='card' class='screen hidden'>
<div class='card paper'>
<h2>Fødselsdagshilsen</h2>
<p>Her kommer din personlige tekst.</p>
<p>Vi udskifter den senere.</p>
<p class='sig'>Thomas ❤️</p>
</div>
</div>
<script src='script.js'></script>
</body></html>
