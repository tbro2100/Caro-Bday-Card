<!DOCTYPE html>
<html lang="da">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Til dig</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="background-glow"></div>

<main class="scene scene-login">

    <section class="login-card">

        <div class="top-line"></div>

        <h1>Til dig</h1>

        <p class="subtitle">

            Der venter noget særligt.

            <br>

            Indtast adgangskoden for at åbne det.

        </p>

        <div class="input-wrapper">

            <span class="lock">🔒</span>

            <input
                id="password"
                type="password"
                autocomplete="off"
                spellcheck="false"
                placeholder="Adgangskode">

        </div>

        <button id="unlockButton">

            Åbn

        </button>

        <p class="hint">

            Hint: Vores ord for "helt crazy".

        </p>

        <p id="error"></p>

    </section>

</main>

<script src="script.js"></script>

</body>

</html>
